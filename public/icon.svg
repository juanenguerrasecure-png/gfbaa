<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Good Finds by AA">
  <defs>
    <radialGradient id="gold" cx="35%" cy="25%" r="75%">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.45" stop-color="#f3bd3c"/>
      <stop offset="1" stop-color="#9f6b12"/>
    </radialGradient>
    <linearGradient id="softGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0a6"/>
      <stop offset="0.5" stop-color="#d89b25"/>
      <stop offset="1" stop-color="#6d4308"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#050403"/>
