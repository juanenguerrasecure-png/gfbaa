        <ellipse cx="0" cy="-44" rx="14" ry="40" transform="rotate(45)"/>
        <ellipse cx="0" cy="-44" rx="14" ry="40" transform="rotate(90)"/>
        <ellipse cx="0" cy="-44" rx="14" ry="40" transform="rotate(135)"/>
        <ellipse cx="0" cy="-44" rx="14" ry="40" transform="rotate(180)"/>
